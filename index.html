<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกรายจ่าย 💸</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        :root {
            --primary: #ff7a3c;
            --primary-hover: #ff631c;
            --primary-light: #fff0e6;
            --success: #2ec4b6;
            --shop-color: #ffb703;
            --bg-color: #fffaf5;
            --card-bg: #ffffff;
            --text-main: #4a3e3d;
            --text-muted: #8a7a78;
            --border-color: #ffe5d9;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.5;
        }
        
        /* 🔒 ส่วนที่เพิ่ม: ซ่อนหน้าแอปหลักไว้ก่อนล็อกอิน และสไตล์หน้าต่างล็อกอิน */
        .container { max-width: 1050px; margin: 0 auto; display: none; }
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .login-box {
            background: white; padding: 35px; border-radius: 24px; width: 90%; max-width: 400px;
            box-shadow: 0 10px 30px rgba(255, 122, 60, 0.1); border: 2px solid var(--border-color); text-align: center;
        }
        .login-box h2 { color: #d95d26; margin-top: 0; margin-bottom: 25px; font-size: 1.6rem; }

        /* ✨ ดีไซน์ดั้งเดิมของน้าทั้งหมด ไม่มีการปรับเปลี่ยนใดๆ ด้านล่างนี้ */
        .web-header {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; gap: 20px; margin-bottom: 30px; padding: 25px 30px;
            background: #ffffff; border-radius: 24px; border: 4.5px solid #d95d26;
            box-shadow: 0 10px 25px -5px rgba(255, 122, 60, 0.08);
        }
        .web-header-text h1 { margin: 0; color: #d95d26; font-size: 2.2rem; font-weight: 800; }
        .web-header-text p { margin: 8px 0 0 0; color: var(--text-muted); font-size: 1rem; }
        
        .header-buttons { display: flex; gap: 10px; }
        .btn-toggle-edit {
            background-color: #fff; color: var(--primary); border: 2px solid var(--primary);
            padding: 10px 24px; border-radius: 50px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; gap: 8px; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .btn-toggle-edit.active { background-color: var(--primary); color: white; }

        .summary-wrapper { display: flex; flex-direction: column; gap: 20px; margin-bottom: 30px; }
        .card.total { width: 100%; text-align: center; padding: 30px; background: #ffffff; border: 3px solid var(--primary); border-radius: 20px; }
        .card.total .amount { font-size: clamp(2rem, 5vw, 3.2rem); color: var(--primary); font-weight: bold; }
        .grid-sub-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; width: 100%; }
        .card { background: var(--card-bg); padding: 22px; border-radius: 20px; border: 2px solid var(--border-color); position: relative; }
        .card.clickable { cursor: pointer; }
        .card .amount { font-size: clamp(1.4rem, 3.5vw, 1.9rem); font-weight: bold; }

        .main-layout { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; margin-bottom: 30px; }
        .edit-mode-section { display: none; }
        .section { background: var(--card-bg); padding: 25px; border-radius: 24px; border: 2px solid var(--border-color); }
        .section h2 { margin-top: 0; margin-bottom: 20px; color: #d95d26; font-size: 1.4rem; border-bottom: 2px dashed var(--border-color); padding-bottom: 10px; }
        .form-group { margin-bottom: 18px; text-align: left; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.95rem; color: #5c4d4c; }
        
        input, select { 
            width: 100%; height: 48px; padding: 0 14px; border: 2px solid var(--border-color); 
            border-radius: 14px; box-sizing: border-box; font-size: 1rem; font-family: inherit;
            color: var(--text-main); background-color: #fffdfb; appearance: none; -webkit-appearance: none;
        }
        select {
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%234a3e3d' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat; background-position: right 12px center; background-size: 16px; padding-right: 40px;
        }
        .flex-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 600px) { .flex-inputs { grid-template-columns: 1fr !important; } }
        
        .btn { background: var(--primary); color: white; border: none; padding: 12px 22px; border-radius: 14px; cursor: pointer; font-size: 1rem; font-weight: bold; width: 100%; margin-top: 5px; }
        .name-manager { display: flex; gap: 10px; }
        .name-manager input { flex: 1; }
        .name-manager .btn { width: auto; height: 48px; }

        .table-section { background: var(--card-bg); padding: 25px; border-radius: 24px; border: 2px solid var(--border-color); margin-bottom: 20px; }
        .table-responsive { max-height: 480px; overflow-y: auto; overflow-x: auto; border-radius: 16px; border: 2px solid var(--border-color); }
        table { width: 100%; border-collapse: collapse; text-align: left; min-width: 650px; }
        th, td { padding: 14px 18px; border-bottom: 1px solid var(--border-color); }
        th { position: sticky; top: 0; background-color: #fff5f0; color: #d95d26; font-weight: bold; }
        .badge-payer { background: #ffe8cc; color: #d9480f; padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; }
        .img-preview { width: 45px; height: 45px; border-radius: 10px; cursor: pointer; object-fit: cover; }
        .modal { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(43, 30, 29, 0.85); justify-content: center; align-items: center; }
        .modal img { max-width: 85%; max-height: 85%; border-radius: 16px; border: 4px solid white; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2>🔐 ลงชื่อเข้าใช้งานระบบ</h2>
        <div class="form-group">
            <label>📧 อีเมลผู้ใช้งาน</label>
            <input type="email" id="login-email" placeholder="example@gmail.com" required>
        </div>
        <div class="form-group">
            <label>🔑 รหัสผ่าน</label>
            <input type="password" id="login-pass" placeholder="ใส่รหัสผ่านเข้าเว็บ" required>
        </div>
        <button class="btn" onclick="checkLogin()">ตกลงเข้าสู่ระบบ</button>
    </div>
</div>

<div class="container" id="main-web-app">
    <div class="web-header">
        <div class="web-header-text">
            <h1>บันทึกรายจ่าย</h1>
            <p>หากต้องการลงบันทึกหรือลบข้อมูล ให้เปิด "โหมดแก้ไข"</p>
        </div>
        <div class="header-buttons">
            <button id="edit-toggle-btn" class="btn-toggle-edit" onclick="toggleEditMode()">⚙️ เปิดโหมดแก้ไข</button>
            <button class="btn-toggle-edit" style="border-color:#ff6b6b; color:#ff6b6b;" onclick="promptChangePassword()">🔑 เปลี่ยนรหัสเข้าเว็บ</button>
        </div>
    </div>

    <div class="summary-wrapper">
        <div class="card total">
            <h3>💰 ยอดรวมทั้งหมด</h3>
            <div class="amount" id="grand-total">0.00<span class="currency">บาท</span></div>
        </div>
        <div class="grid-sub-summary">
            <div class="card shop clickable" onclick="filterByPayer('ร้าน')">
                <h3>🏪 ร้านจ่าย</h3>
                <div class="amount" id="shop-total">0.00<span class="currency">บาท</span></div>
            </div>
            <div id="dynamic-person-boxes" style="display: contents;"></div>
        </div>
    </div>

    <div class="main-layout edit-mode-section" id="edit-widgets">
        <div class="section">
            <h2>👤 เพิ่มรายชื่อคนจ่าย (<span id="payer-count">0</span>/20)</h2>
            <div class="form-group">
                <label>เพิ่มสมาชิกใหม่ได้เลย!</label>
                <div class="name-manager">
                    <input type="text" id="new-name" placeholder="ใส่ชื่อ เช่น คนสวย">
                    <button class="btn" onclick="addPayerName()">✨ เพิ่มชื่อ</button>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>📝 บันทึกรายจ่ายใหม่</h2>
            <form id="expense-form" onsubmit="saveExpense(event)">
                <div class="flex-inputs">
                    <div class="form-group">
                        <label>📅 วันที่</label>
                        <input type="date" id="exp-date" required>
                    </div>
                    <div class="form-group">
                        <label>🙋 ใครเป็นคนจ่าย?</label>
                        <select id="exp-payer" required>
                            <option value="default">โหลดข้อมูลรายชื่อ...</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>✏️ รายการ / ค่าใช้จ่ายอะไร</label>
                    <input type="text" id="exp-title" placeholder="เช่น ค่าของเข้าร้าน" required>
                </div>
                <div class="form-group">
                    <label>💵 จำนวนเงิน (บาท)</label>
                    <input type="number" id="exp-amount" step="0.01" placeholder="0.00" required>
                </div>
                <div class="flex-inputs">
                    <div class="form-group">
                        <label>📸 แนบสลิป</label>
                        <input type="file" id="exp-slip" accept="image/*">
                    </div>
                    <div class="form-group">
                        <label>🧾 ใบเสร็จรับเงิน</label>
                        <input type="file" id="exp-receipt" accept="image/*">
                    </div>
                </div>
                <button type="submit" class="btn" id="btn-submit-expense">บันทึกรายการ</button>
            </form>
        </div>
    </div>

    <div class="table-section" id="table-display-section">
        <div class="filter-header">
            <h2 id="table-title" style="margin:0; border:none; padding:0; font-size: 1.4rem;">📋 ประวัติบันทึกรายจ่าย</h2>
        </div>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>📅 วันที่</th>
                        <th>รายการ</th>
                        <th>คนจ่าย</th>
                        <th>ยอดเงิน</th>
                        <th>สลิป</th>
                        <th>ใบเสร็จ</th>
                        <th id="th-manage" style="display:none;">⚙️ จัดการ</th>
                    </tr>
                </thead>
                <tbody id="expense-table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="image-modal" class="modal" onclick="this.style.display='none'">
    <img id="modal-img" src="">
</div>

<script>
    // ⚙️ เชื่อมต่อระบบ Firebase อิงจากค่าน้าเป๊ะๆ 
    const firebaseConfig = {
        apiKey: "AIzaSyAVwlKajtiOGGK0FQl4Kb17-UbYMqlnMd8",
        authDomain: "incomeandexpenserecord.firebaseapp.com",
        databaseURL: "https://incomeandexpenserecord-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "incomeandexpenserecord",
        storageBucket: "incomeandexpenserecord.firebasestorage.app",
        messagingSenderId: "1059338381507",
        appId: "1:1059338381507:web:5f3133bdc4401ff8bb1a76"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // 🔒 ล็อกอีเมลสิทธิ์ใช้งานตรงนี้ (น้าเปลี่ยนเป็นอีเมลลูกค้าได้เลยครับ)
    let allowedEmail = "customer123@gmail.com"; 

    // ฟังก์ชันเช็กล็อกอินจากฐานข้อมูลออนไลน์
    function checkLogin() {
        const emailInput = document.getElementById('login-email').value.trim();
        const passInput = document.getElementById('login-pass').value.trim();

        if (emailInput !== allowedEmail) {
            alert("❌ อีเมลนี้ไม่มีสิทธิ์เข้าใช้งานระบบค่ะ");
            return;
        }

        database.ref('web_password').once('value').then((snapshot) => {
            let correctPassword = snapshot.val() || "1234"; 
            
            if (passInput === correctPassword) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-web-app').style.display = 'block';
                initApp(); 
            } else {
                alert("❌ รหัสผ่านไม่ถูกต้อง กรุณลองใหม่น้า");
            }
        });
    }

    // ฟังก์ชันให้ลูกค้ากดเปลี่ยนรหัสผ่านออนไลน์ (อยู่ถาวรไม่หาย)
    function promptChangePassword() {
        let currentPass = prompt("กรุณาใส่รหัสผ่านปัจจุบันก่อนค่ะ:");
        database.ref('web_password').once('value').then((snapshot) => {
            let correctPassword = snapshot.val() || "1234";
            if (currentPass !== correctPassword) {
                alert("❌ รหัสผ่านปัจจุบันไม่ถูกต้อง เปลี่ยนรหัสไม่ได้ค่ะ");
                return;
            }
            let newPass = prompt("ระบุรหัสผ่านใหม่ที่ต้องการ (บันทึกขึ้นระบบออนไลน์ทันที):");
            if (newPass && newPass.trim().length >= 4) {
                database.ref('web_password').set(newPass.trim()); 
                alert("✅ เปลี่ยนรหัสผ่านเรียบร้อย! รหัสนี้จะอยู่ถาวรตลอดไปค่ะ");
            } else {
                alert("❌ รหัสผ่านใหม่ต้องมี 4 ตัวอักษรขึ้นไปน้า");
            }
        });
    }

    // --- ส่วนของโปรแกรมบันทึกรายจ่ายดั้งเดิมตามบรีฟเก่าของน้าเป๊ะๆ ---
    let db;
    let payers = JSON.parse(localStorage.getItem('payers_cute')) || [];
    let expenses = [];
    let isEditMode = false;
    let currentFilterPayer = 'all';

    function initApp() {
        const request = indexedDB.open("CuteExpenseUltimateDB", 1);
        request.onupgradeneeded = function(e) {
            db = e.target.result;
            if (!db.objectStoreNames.contains("expenses")) { db.createObjectStore("expenses", { keyPath: "id" }); }
        };
        request.onsuccess = function(e) {
            db = e.target.result;
            loadExpensesFromDB();
        };
        setTodayDate();
    }

    function loadExpensesFromDB() {
        const transaction = db.transaction(["expenses"], "readonly");
        const store = transaction.objectStore("expenses");
        const getAll = store.getAll();
        getAll.onsuccess = function() {
            expenses = getAll.result || [];
            expenses.sort((a, b) => b.id - a.id);
            renderAll();
            updatePayerDropdown();
        };
    }

    function setTodayDate() { document.getElementById('exp-date').valueAsDate = new Date(); }
    function toggleEditMode() {
        isEditMode = !isEditMode;
        const btn = document.getElementById('edit-toggle-btn');
        const edit = document.getElementById('edit-widgets');
        if (isEditMode) { btn.textContent = '🔒 ปิดโหมดแก้ไข'; btn.classList.add('active'); edit.style.display = 'grid'; } 
        else { btn.textContent = '⚙️ เปิดโหมดแก้ไข'; btn.classList.remove('active'); edit.style.display = 'none'; }
        renderAll();
    }

    function addPayerName() {
        const input = document.getElementById('new-name'); const name = input.value.trim();
        if (!name || payers.length >= 20 || name === 'ร้าน' || payers.includes(name)) return;
        payers.push(name); localStorage.setItem('payers_cute', JSON.stringify(payers));
        input.value = ''; updatePayerDropdown(); renderAll();
    }

    function deletePayer(name) {
        if (!confirm(`ลบชื่อ "${name}"?`)) return;
        payers = payers.filter(p => p !== name); localStorage.setItem('payers_cute', JSON.stringify(payers));
        updatePayerDropdown(); renderAll();
    }

    function updatePayerDropdown() {
        const select = document.getElementById('exp-payer'); if(!select) return;
        select.innerHTML = `<option value="ร้าน">ร้านจ่าย</option>`;
        payers.forEach(name => { const op = document.createElement('option'); op.value = name; op.textContent = name; select.appendChild(op); });
    }

    function compressImageFile(file) {
        return new Promise(resolve => {
            if (!file) { resolve(null); return; }
            const reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = function(event) {
                const img = new Image(); img.src = event.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas'); let width = img.width; let height = img.height;
                    if (width > 800) { height *= 800 / width; width = 800; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.7));
                };
            };
        });
    }

    async function saveExpense(e) {
        e.preventDefault();
        const title = document.getElementById('exp-title').value.trim();
        const amount = parseFloat(document.getElementById('exp-amount').value);
        const slipFile = document.getElementById('exp-slip').files[0];
        const receiptFile = document.getElementById('exp-receipt').files[0];
        const slip = await compressImageFile(slipFile);
        const receipt = await compressImageFile(receiptFile);

        const newExpense = { id: Date.now(), date: document.getElementById('exp-date').value, payer: document.getElementById('exp-payer').value, title, amount, slip, receipt };
        expenses.unshift(newExpense);
        const transaction = db.transaction(["expenses"], "readwrite");
        transaction.objectStore("expenses").put(newExpense);
        renderAll(); document.getElementById('expense-form').reset(); setTodayDate(); updatePayerDropdown();
    }

    function deleteExpense(id) {
        if (!confirm('ลบรายการนี้?')) return;
        expenses = expenses.filter(item => item.id !== id);
        const transaction = db.transaction(["expenses"], "readwrite");
        transaction.objectStore("expenses").delete(id);
        renderAll();
    }

    function filterByPayer(payerName) { currentFilterPayer = payerName; renderTable(); }

    function renderSummary() {
        let grand = 0; let shop = 0; const person = {}; payers.forEach(p => person[p] = 0);
        expenses.forEach(exp => { grand += exp.amount; if (exp.payer === 'ร้าน') { shop += exp.amount; } else { if (person[exp.payer] !== undefined) person[exp.payer] += exp.amount; } });
        document.getElementById('grand-total').innerHTML = `${grand.toLocaleString('th-TH', {minimumFractionDigits:2})} <span class="currency">บาท</span>`;
        document.getElementById('shop-total').innerHTML = `${shop.toLocaleString('th-TH', {minimumFractionDigits:2})} <span class="currency">บาท</span>`;
        const box = document.getElementById('dynamic-person-boxes'); box.innerHTML = '';
        Object.keys(person).forEach(name => {
            const card = document.createElement('div'); card.className = 'card person clickable'; card.setAttribute('onclick', `filterByPayer('${name}')`);
            card.innerHTML = `<h3><span>👤 ${name}</span>${isEditMode ? `<button style="background:red; color:white; border:none; border-radius:50%; width:20px; height:20px;" onclick="event.stopPropagation(); deletePayer('${name}')">✕</button>` : ''}</h3><div class="amount">${person[name].toLocaleString('th-TH', {minimumFractionDigits:2})} <span class="currency">บาท</span></div>`;
            box.appendChild(card);
        });
    }

    function viewImage(img) { if (!img) return; document.getElementById('modal-img').src = img; document.getElementById('image-modal').style.display = 'flex'; }

    function renderTable() {
        const tbody = document.getElementById('expense-table-body'); const th = document.getElementById('th-manage');
        if(!tbody) return; tbody.innerHTML = ''; th.style.display = isEditMode ? 'table-cell' : 'none';
        const displayedExpenses = currentFilterPayer === 'all' ? expenses : expenses.filter(exp => exp.payer === currentFilterPayer);
        displayedExpenses.forEach(exp => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${exp.date}</td><td>${exp.title}</td><td><span class="badge-payer">${exp.payer}</span></td><td>${exp.amount.toLocaleString()}</td>
                <td>${exp.slip ? `<img src="${exp.slip}" class="img-preview" onclick="viewImage('${exp.slip}')">` : '-'}</td>
                <td>${exp.receipt ? `<img src="${exp.receipt}" class="img-preview" onclick="viewImage('${exp.receipt}')">` : '-'}</td>
                <td style="display:${isEditMode ? 'table-cell' : 'none'}"><button onclick="deleteExpense(${exp.id})">ลบ</button></td>
            `;
            tbody.appendChild(tr);
        });
    }
    function renderAll() { renderSummary(); renderTable(); }
</script>
</body>
</html>
