<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกรายจ่าย 💸</title>
    <style>
        :root {
            --primary: #ff7a3c;
            --primary-hover: #ff631c;
            --primary-light: #fff0e6;
            --success: #2ec4b6;
            --shop-color: #ffb703;
            --bg-color: #fffaf5;
            --card-bg: #ffffff;
            --text-main: #4a3e3d;
            --text-muted: #8a7a78;
            --border-color: #ffe5d9;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.5;
        }
        .container {
            max-width: 1050px;
            margin: 0 auto;
        }
        
        /* Header & Control */
        .web-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
            padding: 20px 30px;
            background: linear-gradient(135deg, #fff0e6 0%, #ffe5d9 100%);
            border-radius: 24px;
            border: 2px dashed #ffb703;
        }
        .web-header-text h1 {
            margin: 0;
            color: #d95d26;
            font-size: 2rem;
        }
        .web-header-text p { margin: 5px 0 0 0; color: var(--text-muted); font-size: 0.95rem; }

        /* Toggle Edit Mode Button */
        .btn-toggle-edit {
            background-color: #fff;
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .btn-toggle-edit:active {
            transform: scale(0.95);
        }
        .btn-toggle-edit.active {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(255, 122, 60, 0.3);
        }

        /* Dashboard Card */
        .grid-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: var(--card-bg);
            padding: 22px;
            border-radius: 20px;
            box-shadow: 0 8px 16px -4px rgba(255, 122, 60, 0.08);
            border: 2px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 6px; height: 100%;
        }
        .card.total::before { background-color: var(--primary); }
        .card.shop::before { background-color: var(--shop-color); }
        .card.person::before { background-color: var(--success); }
        
        .card h3 { font-size: 0.95rem; color: var(--text-muted); margin: 0 0 8px 0; display: flex; justify-content: space-between; align-items: center;}
        .card .amount { font-size: 1.9rem; font-weight: bold; color: #2b1e1d; }
        .card .currency { font-size: 1rem; font-weight: normal; color: var(--text-muted); margin-left: 4px; }

        /* Delete Payer Button */
        .btn-del-payer {
            background: #ff6b6b;
            color: white;
            border: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            font-size: 0.7rem;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .btn-del-payer:active {
            transform: scale(0.85);
        }

        /* Layout Columns */
        .main-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        
        /* Edit Section Container */
        .edit-mode-section {
            display: none;
        }

        .section {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 8px 16px -4px rgba(255, 122, 60, 0.06);
            border: 2px solid var(--border-color);
            height: 100%;
            box-sizing: border-box;
        }
        .section h2 { 
            margin-top: 0; margin-bottom: 20px; color: #d95d26; font-size: 1.4rem;
            border-bottom: 2px dashed var(--border-color); padding-bottom: 10px;
        }
        
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.95rem; color: #5c4d4c; }
        input, select {
            width: 100%; padding: 12px; border: 2px solid var(--border-color);
            border-radius: 14px; box-sizing: border-box; font-size: 1rem;
            color: var(--text-main); background-color: #fffdfb;
        }
        .flex-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        /* Buttons */
        .btn {
            background: var(--primary); color: white; border: none; padding: 12px 22px;
            border-radius: 14px; cursor: pointer; font-size: 1rem; font-weight: bold;
            display: inline-flex; align-items: center; justify-content: center; gap: 6px;
            box-shadow: 0 4px 10px rgba(255, 122, 60, 0.2); width: 100%;
            transition: background 0.2s, transform 0.1s;
        }
        .btn:hover { background: var(--primary-hover); }
        .btn:active {
            transform: scale(0.96); 
            box-shadow: 0 2px 5px rgba(255, 122, 60, 0.2);
        }
        
        .btn-danger { background: #ff6b6b; box-shadow: 0 4px 10px rgba(255, 107, 107, 0.2); width: auto; display: none;}
        .btn-danger:hover { background: #fa5252; }
        .btn-danger:active {
            transform: scale(0.92);
            box-shadow: 0 2px 5px rgba(255, 107, 107, 0.2);
        }

        .name-manager { display: flex; gap: 10px; }
        .name-manager input { flex: 1; }
        .name-manager .btn { width: auto; white-space: nowrap; }

        /* Table Section */
        .table-section {
            background: var(--card-bg); padding: 25px; border-radius: 24px;
            box-shadow: 0 8px 16px -4px rgba(255, 122, 60, 0.06); border: 2px solid var(--border-color);
        }
        
        /* ล็อกตารางให้สูงประมาณ 5 แถว เลื่อนถูดูได้เลย */
        .table-responsive { 
            max-height: 330px; 
            overflow-y: auto; 
            overflow-x: auto; 
            border-radius: 16px; 
            border: 2px solid var(--border-color); 
        }
        
        table { width: 100%; border-collapse: collapse; text-align: left; background: white; }
        th { 
            position: sticky;
            top: 0;
            background-color: #fff5f0; 
            color: #d95d26; 
            font-weight: bold; 
            z-index: 10;
            box-shadow: 0 1px 0 var(--border-color);
        }
        th, td { padding: 14px 18px; border-bottom: 1px solid var(--border-color); }
        
        .badge-payer { background: #ffe8cc; color: #d9480f; padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; }
        .badge-shop { background: #fff3bf; color: #f59e0b; }

        .img-preview { width: 45px; height: 45px; border-radius: 10px; cursor: pointer; object-fit: cover; border: 2px solid var(--border-color); }
        .no-img { font-size: 0.85rem; color: var(--text-muted); font-style: italic; }

        .modal {
            display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(43, 30, 29, 0.85); backdrop-filter: blur(5px); justify-content: center; align-items: center;
        }
        .modal img { max-width: 85%; max-height: 85%; border-radius: 16px; border: 4px solid white; }
    </style>
</head>
<body>

<div class="container">
    <div class="web-header">
        <div class="web-header-text">
            <h1>บันทึกรายจ่าย</h1>
            <p>โหมดปกติไว้สำหรับดูยอดเงิน หากต้องการลงบันทึกหรือลบข้อมูล ให้เปิด "โหมดแก้ไข" น้า</p>
        </div>
        <button id="edit-toggle-btn" class="btn-toggle-edit" onclick="toggleEditMode()">
            ⚙️ เปิดโหมดแก้ไข
        </button>
    </div>

    <div class="grid-summary" id="summary-boxes">
        <div class="card total">
            <h3>💰 ยอดรวมทั้งหมด</h3>
            <div class="amount" id="grand-total">0.00<span class="currency">บาท</span></div>
        </div>
        <div class="card shop">
            <h3>🏪 ร้านจ่าย</h3>
            <div class="amount" id="shop-total">0.00<span class="currency">บาท</span></div>
        </div>
        <div id="dynamic-person-boxes" style="display: contents;"></div>
    </div>

    <div class="main-layout edit-mode-section" id="edit-widgets">
        <div class="section">
            <h2>👤 จัดการรายชื่อคนจ่าย</h2>
            <div class="form-group">
                <label>เพิ่มสมาชิกใหม่</label>
                <div class="name-manager">
                    <input type="text" id="new-name" placeholder="ใส่ชื่อ เช่น คนสวย">
                    <button class="btn" onclick="addPayerName()">✨ เพิ่มชื่อ</button>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>📝 บันทึกรายจ่ายใหม่</h2>
            <form id="expense-form" onsubmit="saveExpense(event)">
                <div class="flex-inputs">
                    <div class="form-group">
                        <label>📅 วันที่</label>
                        <input type="date" id="exp-date" required>
                    </div>
                    <div class="form-group">
                        <label>🙋 ใครเป็นคนจ่าย?</label>
                        <select id="exp-payer" required>
                            <option value="ร้าน">ร้านจ่าย</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>✏️ รายการ / ค่าใช้จ่ายอะไร</label>
                    <input type="text" id="exp-title" placeholder="เช่น ค่าของเข้าร้าน" required>
                </div>

                <div class="form-group">
                    <label>💵 จำนวนเงิน (บาท)</label>
                    <input type="number" id="exp-amount" step="0.01" placeholder="0.00" required>
                </div>

                <div class="flex-inputs">
                    <div class="form-group">
                        <label>📸 แนบสลิป</label>
                        <input type="file" id="exp-slip" accept="image/*">
                    </div>
                    <div class="form-group">
                        <label>🧾 ใบเสร็จรับเงิน</label>
                        <input type="file" id="exp-receipt" accept="image/*">
                    </div>
                </div>

                <button type="submit" class="btn" id="btn-submit-expense">🎈 บันทึกรายการ</button>
            </form>
        </div>
    </div>

    <div class="table-section">
        <h2>📋 ประวัติบันทึกรายจ่าย</h2>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th style="width: 15%;">วันที่</th>
                        <th style="width: 25%;">รายการ</th>
                        <th style="width: 15%;">คนจ่าย</th>
                        <th style="width: 15%;">ยอดเงิน</th>
                        <th style="width: 10%;">สลิป</th>
                        <th style="width: 10%;">ใบเสร็จ</th>
                        <th id="th-manage" style="width: 10%;">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="expense-table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="image-modal" class="modal" onclick="this.style.display='none'">
    <img id="modal-img" src="">
</div>

<script>
let payers = JSON.parse(localStorage.getItem('payers_cute')) || [];
let expenses = JSON.parse(localStorage.getItem('expenses_cute')) || [];
let isEditMode = false;

function setTodayDate(){
    document.getElementById(
        'exp-date'
    ).valueAsDate = new Date();
}

setTodayDate();

function saveStorage(){

    localStorage.setItem(
        'payers_cute',
        JSON.stringify(payers)
    );

    localStorage.setItem(
        'expenses_cute',
        JSON.stringify(expenses)
    );

}

function showMsg(text){

    const old =
    document.getElementById(
        'toast-msg'
    );

    if(old){
        old.remove();
    }

    const box =
    document.createElement(
        'div'
    );

    box.id='toast-msg';

    box.innerHTML=text;

    box.style.cssText=`
    position:fixed;
    bottom:25px;
    left:50%;
    transform:translateX(-50%);
    background:#2ec4b6;
    color:white;
    padding:12px 20px;
    border-radius:14px;
    font-weight:bold;
    z-index:9999;
    box-shadow:0 6px 18px rgba(0,0,0,.18);
    `;

    document.body.appendChild(box);

    setTimeout(()=>{

        box.remove();

    },1800);

}

function toggleEditMode(){

    isEditMode=!isEditMode;

    const btn=
    document.getElementById(
        'edit-toggle-btn'
    );

    const edit=
    document.getElementById(
        'edit-widgets'
    );

    if(isEditMode){

        btn.textContent=
        '🔒 ปิดโหมดแก้ไข';

        btn.classList.add(
            'active'
        );

        edit.style.display=
        'grid';

    }else{

        btn.textContent=
        '⚙️ เปิดโหมดแก้ไข';

        btn.classList.remove(
            'active'
        );

        edit.style.display=
        'none';

    }

    renderAll();

}

function addPayerName(){

    const input=
    document.getElementById(
        'new-name'
    );

    const name=
    input.value.trim();

    if(!name){

        alert(
            'กรอกชื่อก่อน'
        );

        return;
    }

    if(
        name==='ร้าน'
        ||
        payers.includes(name)
    ){

        alert(
            'ชื่อนี้มีแล้ว'
        );

        return;

    }

    payers.push(name);

    saveStorage();

    input.value='';

    updatePayerDropdown();

    renderAll();

    showMsg(
        'เพิ่มชื่อแล้ว ✅'
    );

}

function deletePayer(name){

    if(
        !confirm(
            `ลบ ${name} ?`
        )
    ) return;

    payers=
    payers.filter(
        p=>p!==name
    );

    saveStorage();

    updatePayerDropdown();

    renderAll();

    showMsg(
        'ลบรายชื่อแล้ว 🗑️'
    );

}

function updatePayerDropdown(){

    const select=
    document.getElementById(
        'exp-payer'
    );

    const current=
    select.value||
    'ร้าน';

    select.innerHTML=
    `
    <option value="ร้าน">
    ร้านจ่าย
    </option>
    `;

    payers.forEach(name=>{

        const op=
        document.createElement(
            'option'
        );

        op.value=name;
        op.textContent=name;

        select.appendChild(op);

    });

    select.value=
    current;

}

function processFile(file){

    return new Promise(
        resolve=>{

        if(!file){

            resolve(null);

            return;

        }

        const reader=
        new FileReader();

        reader.onload=
        ()=>resolve(
            reader.result
        );

        reader.readAsDataURL(
            file
        );

    });

}

async function saveExpense(e){

    e.preventDefault();

    const title =
    document.getElementById(
    'exp-title'
    ).value.trim();

    const amount =
    parseFloat(
    document.getElementById(
    'exp-amount'
    ).value
    );

    if(
    !title ||
    isNaN(amount) ||
    amount<=0
    ){

        alert(
        'กรอกข้อมูลให้ครบ'
        );

        return;
    }

    showMsg(
    'กำลังบันทึก...'
    );

    const slip =
    await processFile(
    document
    .getElementById(
    'exp-slip'
    )
    .files[0]
    );

    const receipt =
    await processFile(
    document
    .getElementById(
    'exp-receipt'
    )
    .files[0]
    );

    expenses.unshift({

        id:Date.now(),

        date:
        document.getElementById(
        'exp-date'
        ).value,

        payer:
        document.getElementById(
        'exp-payer'
        ).value,

        title,

        amount,

        slip,

        receipt

    });

    saveStorage();

    renderAll();

    document
    .getElementById(
    'expense-form'
    )
    .reset();

    setTodayDate();

    updatePayerDropdown();

    showMsg(
    'บันทึกแล้ว ✅'
    );

}

function deleteExpense(id){

    if(
        !confirm(
            'ลบรายการนี้ ?'
        )
    ) return;

    expenses=
    expenses.filter(
        item=>
        item.id!==id
    );

    saveStorage();

    renderAll();

    showMsg(
        'ลบแล้ว 🗑️'
    );

}

function renderSummary(){

    let grand=0;
    let shop=0;

    const person={};

    payers.forEach(
        p=>person[p]=0
    );

    expenses.forEach(exp=>{

        grand+=exp.amount;

        if(
            exp.payer==='ร้าน'
        ){

            shop+=exp.amount;

        }else{

            if(
                person[
                exp.payer
                ]===undefined
            ){

                person[
                exp.payer
                ]=0;

            }

            person[
            exp.payer
            ]+=exp.amount;

        }

    });

    document.getElementById(
    'grand-total'
    ).innerHTML=
    `
    ${grand.toLocaleString(
    'th-TH',
    {
    minimumFractionDigits:2
    }
    )}

    <span class="currency">
    บาท
    </span>
    `;

    document.getElementById(
    'shop-total'
    ).innerHTML=
    `
    ${shop.toLocaleString(
    'th-TH',
    {
    minimumFractionDigits:2
    }
    )}

    <span class="currency">
    บาท
    </span>
    `;

    const box=
    document.getElementById(
        'dynamic-person-boxes'
    );

    box.innerHTML='';

    Object.keys(person)
    .forEach(name=>{

        const card=
        document.createElement(
            'div'
        );

        card.className=
        'card person';

        card.innerHTML=
        `
        <h3>

        👤 ${name}

        ${
        isEditMode
        ?
        `
        <button
        class="btn-del-payer"
        style="display:flex"
        onclick="
        deletePayer(
        '${name}'
        )
        ">
        ✕
        </button>
        `
        :
        ''
        }

        </h3>

        <div class="amount">

        ${person[name]
        .toLocaleString(
        'th-TH',
        {
        minimumFractionDigits:2
        }
        )}

        <span class="currency">
        บาท
        </span>

        </div>
        `;

        box.appendChild(card);

    });

}

function viewImage(img){

    if(!img)return;

    document.getElementById(
    'modal-img'
    ).src=img;

    document.getElementById(
    'image-modal'
    ).style.display=
    'flex';

}

function renderTable(){

    const tbody=
    document.getElementById(
    'expense-table-body'
    );

    const th=
    document.getElementById(
    'th-manage'
    );

    tbody.innerHTML='';

    th.style.display=
    isEditMode
    ?''
    :'none';

    expenses.forEach(exp=>{

        const tr=
        document.createElement(
            'tr'
        );

        tr.innerHTML=
        `
        <td>
        ${new Date(
        exp.date
        ).toLocaleDateString(
        'th-TH'
        )}
        </td>

        <td>
        ${exp.title}
        </td>

        <td>
        ${exp.payer}
        </td>

        <td>
        ${exp.amount
        .toLocaleString(
        'th-TH',
        {
        minimumFractionDigits:2
        }
        )}
        </td>

        <td>
        ${
        exp.slip
        ?
        `<img
        src="${exp.slip}"
        class="img-preview"
        onclick="
        viewImage(
        '${exp.slip}'
        )
        ">`
        :
        '-'
        }
        </td>

        <td>
        ${
        exp.receipt
        ?
        `<img
        src="${exp.receipt}"
        class="img-preview"
        onclick="
        viewImage(
        '${exp.receipt}'
        )
        ">`
        :
        '-'
        }
        </td>

        ${
        isEditMode
        ?
        `
        <td>

        <button
        class="btn btn-danger"
        onclick="
        deleteExpense(
        ${exp.id}
        )
        ">

        ลบ

        </button>

        </td>
        `
        :
        ''
        }

        `;

        tbody.appendChild(tr);

    });

    if(
        expenses.length===0
    ){

        tbody.innerHTML=
        `
        <tr>

        <td
        colspan="7"
        style="
        text-align:center;
        padding:25px;
        ">

        ยังไม่มีรายการ

        </td>

        </tr>
        `;

    }

}

function renderAll(){

    renderSummary();

    renderTable();

}

updatePayerDropdown();

renderAll();
</script>

</body>
</html>
